<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Base white circle -->
  <circle cx="100" cy="100" r="99" fill="white"/>

  <!-- Outer solid ring -->
  <circle cx="100" cy="100" r="97" stroke="#2563eb" stroke-width="3"/>

  <!-- Dashed ornamental ring -->
  <circle cx="100" cy="100" r="86" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="3.5 4.5" opacity="0.45"/>

  <!-- Inner solid ring — text boundary -->
  <circle cx="100" cy="100" r="76" stroke="#1d4ed8" stroke-width="1.5"/>

  <!-- Cardinal tick marks between outer rings -->
  <line x1="100" y1="3"   x2="100" y2="14"  stroke="#2563eb" stroke-width="3"/>
  <line x1="100" y1="186" x2="100" y2="197" stroke="#2563eb" stroke-width="3"/>
  <line x1="3"   y1="100" x2="14"  y2="100" stroke="#2563eb" stroke-width="3"/>
  <line x1="186" y1="100" x2="197" y2="100" stroke="#2563eb" stroke-width="3"/>

  <!-- 45° accent dots -->
  <circle cx="31.5"  cy="31.5"  r="2.5" fill="#2563eb" opacity="0.5"/>
  <circle cx="168.5" cy="31.5"  r="2.5" fill="#2563eb" opacity="0.5"/>
  <circle cx="31.5"  cy="168.5" r="2.5" fill="#2563eb" opacity="0.5"/>
  <circle cx="168.5" cy="168.5" r="2.5" fill="#2563eb" opacity="0.5"/>

  <!-- Arc text paths (r=82, centre 100,100) -->
  <defs>
    <!-- top arc: counterclockwise = sweep 0 = goes over the top -->
    <path id="ta" d="M 18,100 A 82,82 0 0,0 182,100"/>
    <!-- bottom arc: clockwise = sweep 1 = goes under the bottom -->
    <path id="ba" d="M 18,100 A 82,82 0 0,1 182,100"/>
  </defs>

  <!-- Top arc text -->
  <text fill="#2563eb" font-size="11.5" font-family="Arial,Helvetica,sans-serif"
        font-weight="700" letter-spacing="3">
    <textPath href="#ta" startOffset="50%" text-anchor="middle">CERTIFICATE OF ANALYSIS</textPath>
  </text>

  <!-- Bottom arc text -->
  <text fill="#1d4ed8" font-size="10" font-family="Arial,Helvetica,sans-serif"
        font-weight="600" letter-spacing="2.5">
    <textPath href="#ba" startOffset="50%" text-anchor="middle">· VERTEX BIOLABS ·</textPath>
  </text>

  <!-- Shield body -->
  <path d="M100 48 L71 63 L71 88 C71 110 84 128 100 136
           C116 128 129 110 129 88 L129 63 Z"
        fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>

  <!-- Checkmark inside shield -->
  <path d="M82 91 L96 105 L123 73"
        stroke="#2563eb" stroke-width="6.5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
